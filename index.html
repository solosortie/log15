<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-09</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-09/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-09/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-09/favicon-16x16.png">
    <link rel="manifest" href="/favicon-09/site.webmanifest">
    <link rel="shortcut icon" href="/favicon-09/favicon.ico">
    <style>
        :root {
            --bg: #1a1412;       /* Midnight / Dark Wood */
            --text: #d7ccc8;     /* Warm Ash / Faded Paper */
            --muted: #8d6e63;    /* Faded Clay */
            --accent: #e64a19;   /* Glowing Saffron / Embers */
            --card: #261c18;     /* Deep Roasted Brown */
            --font-ui: 'Quicksand', sans-serif;
            --font-ink: 'Kalam', cursive;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            /* Subtle ember glow in the background */
            background-image:
                radial-gradient(ellipse 80% 60% at 50% 40%, rgba(230,74,25,0.03) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 50% 80%, rgba(141,110,99,0.05) 0%, transparent 60%);
            position: relative;
            color: var(--text);
            font-family: var(--font-ui);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
        }

        #lock-screen, #journal-container, #entry-modal, #edit-modal, #toast {
            position: relative;
            z-index: 1;
        }

        /* ── LOCK ── */
        #lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: opacity 0.5s ease;
        }
        .jharokha-icon {
            margin-bottom: 1.5rem;
            opacity: 0.7;
        }
        #lock-screen h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 8px;
            color: var(--muted);
            margin-bottom: 2.5rem;
        }
        #password-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--muted);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 1.1rem;
            padding: 0.5rem;
            text-align: center;
            outline: none;
            letter-spacing: 3px;
            width: 200px;
            transition: border-color 0.3s;
        }
        #password-input:focus { border-color: var(--accent); }

        /* ── JOURNAL ── */
        #journal-container {
            display: none;
            width: 100%;
            max-width: 680px;
            padding: 3.5rem 2rem 6rem;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(141,110,99,0.3);
            position: relative;
        }
        .header-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h2 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 5px;
            color: var(--muted);
            text-transform: uppercase;
        }
        .add-btn {
            background: transparent;
            border: 1px solid rgba(141,110,99,0.6);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .add-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ── COMPOSER ── */
        .composer-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.55s cubic-bezier(0.4,0,0.2,1),
                        margin-bottom 0.55s cubic-bezier(0.4,0,0.2,1),
                        opacity 0.3s ease;
            opacity: 0;
        }
        .composer-wrapper.open {
            max-height: 2000px;
            margin-bottom: 3rem;
            opacity: 1;
        }
        .composer {
            background: var(--card);
            border-radius: 14px;
            padding: 1.8rem;
            border: 1px solid rgba(141,110,99,0.15);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            position: relative;
        }
        /* Corner accent for composer */
        .composer::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px;
            width: 15px; height: 15px;
            border-top: 2px solid rgba(141,110,99,0.3);
            border-left: 2px solid rgba(141,110,99,0.3);
            pointer-events: none;
        }
        .composer::after {
            content: '';
            position: absolute;
            bottom: 10px; right: 10px;
            width: 15px; height: 15px;
            border-bottom: 2px solid rgba(141,110,99,0.3);
            border-right: 2px solid rgba(141,110,99,0.3);
            pointer-events: none;
        }

        .composer input[type="text"],
        .composer textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text);
            outline: none;
            display: block;
        }
        .composer input[type="text"] {
            font-family: var(--font-ui);
            font-size: 1.3rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(141,110,99,0.3);
            padding-bottom: 0.6rem;
            margin-bottom: 1.4rem;
        }
        .composer input[type="text"]::placeholder,
        .composer textarea::placeholder {
            color: rgba(141,110,99,0.6);
        }
        .composer textarea {
            font-family: var(--font-ink);
            font-size: 1.25rem;
            resize: vertical;
            min-height: 130px;
            line-height: 1.75;
            margin-bottom: 1.4rem;
        }

        .score-row {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.4rem;
        }
        .score-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            white-space: nowrap;
        }
        .score-dots { display: flex; gap: 0.35rem; }
        .score-pip {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1.5px solid rgba(141,110,99,0.4);
            background: transparent;
            cursor: pointer;
            font-family: var(--font-ui);
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.18s;
            padding: 0;
        }
        .score-pip:hover { border-color: var(--accent); color: var(--accent); }
        .score-pip.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
            box-shadow: 0 0 10px rgba(230,74,25,0.4);
        }

        .composer-actions { text-align: right; }
        .record-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            font-family: var(--font-ui);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 0.5rem 1.6rem;
            border-radius: 20px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }
        .record-btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .record-btn:active { transform: translateY(0); }
        .record-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ── VERTICAL TIMELINE ── */
        .timeline {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            transform: translateX(-50%);
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(141,110,99,0.3) 4%,
                rgba(141,110,99,0.3) 96%,
                transparent 100%
            );
        }

        .tl-node {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 2.8rem;
            cursor: pointer;
        }
        .tl-node:last-child { margin-bottom: 0; }

        .tl-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 0.3s ease,
                        opacity 0.3s ease;
        }
        .tl-node:hover .tl-dot {
            transform: scale(1.8);
        }

        .tl-preview {
            position: absolute;
            top: 50%;
            left: calc(50% + 22px);
            transform: translateY(-50%) translateX(8px);
            background: rgba(38,28,24,0.96);
            border: 1px solid rgba(141,110,99,0.2);
            border-radius: 10px;
            padding: 0.6rem 0.9rem;
            min-width: 155px;
            max-width: 220px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease,
                        transform 0.26s cubic-bezier(0.34,1.2,0.64,1);
            z-index: 20;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .tl-node:hover .tl-preview {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }
        .tl-preview-score {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 0.15rem;
        }
        .tl-preview-score span {
            font-size: 0.7rem;
            color: var(--muted);
            font-weight: 500;
        }
        .tl-preview-date {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 0.15rem;
        }
        .tl-preview-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── ENTRY VIEW MODAL ── */
        #entry-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(18,13,11,0.9);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #entry-modal.open {
            display: flex;
            animation: fadein 0.25s ease forwards;
        }
        @keyframes fadein { from { opacity:0; } to { opacity:1; } }
        @keyframes slideup {
            from { transform: translateY(22px); opacity:0; }
            to   { transform: translateY(0);    opacity:1; }
        }
        .entry-modal-box {
            background: var(--card);
            border-radius: 18px;
            padding: 2.2rem 2.4rem;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(141,110,99,0.25);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            scrollbar-width: thin;
            scrollbar-color: rgba(141,110,99,0.3) transparent;
            animation: slideup 0.32s cubic-bezier(0.34,1.2,0.64,1) forwards;
        }

        .view-score-badge {
            display: inline-flex;
            align-items: baseline;
            gap: 2px;
            margin-bottom: 0.6rem;
        }
        .view-score-number {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1;
        }
        .view-score-denom {
            font-size: 1rem;
            color: var(--muted);
            font-weight: 500;
        }
        .view-score-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 1.4rem;
        }
        .view-score-bar-pip {
            height: 3px;
            flex: 1;
            border-radius: 2px;
            background: rgba(141,110,99,0.2);
        }

        .view-date {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 0.35rem;
        }
        .view-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 1.4rem;
            line-height: 1.3;
        }
        .view-content {
            font-family: var(--font-ink);
            font-size: 1.2rem;
            color: #bfaea6;
            white-space: pre-line;
            line-height: 1.9;
            margin-bottom: 2rem;
        }
        .view-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.6rem;
            padding-top: 1.2rem;
            border-top: 1px solid rgba(141,110,99,0.2);
        }
        .view-close-btn {
            margin-right: auto;
            background: transparent;
            border: 1px solid rgba(141,110,99,0.4);
            color: var(--muted);
            font-family: var(--font-ui);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .view-close-btn:hover { border-color: var(--text); color: var(--text); }
        .entry-edit-btn, .entry-delete-btn {
            background: transparent;
            font-family: var(--font-ui);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .entry-edit-btn { border: 1px solid rgba(230,74,25,0.4); color: var(--accent); }
        .entry-edit-btn:hover { background: rgba(230,74,25,0.1); }
        .entry-delete-btn { border: 1px solid rgba(211,47,47,0.4); color: #e53935; }
        .entry-delete-btn:hover { background: rgba(211,47,47,0.1); }

        /* ── EDIT MODAL ── */
        #edit-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(18,13,11,0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        #edit-modal.open {
            display: flex;
            animation: fadein 0.22s ease forwards;
        }
        .modal-box {
            background: var(--card);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(141,110,99,0.25);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            animation: slideup 0.28s cubic-bezier(0.34,1.2,0.64,1) forwards;
        }
        .modal-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }
        .modal-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(141,110,99,0.4);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 1rem;
            font-weight: 600;
            padding: 0.4rem 0;
            outline: none;
            margin-bottom: 1.4rem;
            letter-spacing: 1px;
        }
        #edit-content {
            width: 100%;
            background: rgba(0,0,0,0.15);
            border: 1px solid rgba(141,110,99,0.3);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font-ink);
            font-size: 1.2rem;
            padding: 0.8rem 1rem;
            outline: none;
            resize: vertical;
            min-height: 160px;
            line-height: 1.8;
            margin-bottom: 1.4rem;
        }
        .modal-score-row {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 1.6rem;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.7rem;
        }
        .modal-cancel-btn {
            background: transparent;
            border: 1px solid rgba(141,110,99,0.5);
            color: var(--muted);
            font-family: var(--font-ui);
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0.5rem 1.4rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-cancel-btn:hover { border-color: var(--text); color: var(--text); }
        .modal-save-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            font-family: var(--font-ui);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 0.5rem 1.6rem;
            border-radius: 20px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .modal-save-btn:hover { opacity: 0.85; }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: var(--card);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.6rem 1.4rem;
            border-radius: 20px;
            border: 1px solid rgba(141,110,99,0.3);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, transform 0.28s ease;
            z-index: 200;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.error { border-color: rgba(211,47,47,0.5); color: #e53935; }

        .empty-state {
            color: var(--muted);
            font-family: var(--font-ui);
            text-align: center;
            padding: 3rem 0;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <svg class="jharokha-icon" width="46" height="60" viewBox="0 0 46 60" fill="none" stroke="var(--muted)" stroke-width="1.5">
            <path d="M5 60 V28 C5 12, 23 5, 23 5 C23 5, 41 12, 41 28 V60" />
            <path d="M12 60 V34 C12 22, 23 16, 23 16 C23 16, 34 22, 34 34 V60" />
            <circle cx="23" cy="48" r="2.5" fill="var(--accent)" stroke="none"/>
        </svg>
        <h1>LOG IN</h1>
        <input type="password" id="password-input" placeholder="password" autofocus>
    </div>

    <div id="journal-container">
        <header>
            <div class="header-title-group">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
                    <path d="M12 2 L15 9 L22 12 L15 15 L12 22 L9 15 L2 12 L9 9 Z" />
                    <circle cx="12" cy="12" r="2" fill="var(--bg)"/>
                </svg>
                <h2>The Log</h2>
            </div>
            <button class="add-btn" onclick="toggleComposer()">+ Add Entry</button>
        </header>

        <div class="composer-wrapper" id="composer-panel">
            <div class="composer">
                <input type="text" id="new-title" placeholder="Title" autocomplete="off">
                <textarea id="new-content" placeholder="Write here."></textarea>
                <div class="score-row">
                    <span class="score-label">Score</span>
                    <div class="score-dots" id="composer-score-dots"></div>
                </div>
                <div class="composer-actions">
                    <button class="record-btn" id="record-btn" onclick="addEntry()">Record</button>
                </div>
            </div>
        </div>

        <div class="timeline" id="timeline-target"></div>
    </div>

    <div id="entry-modal">
        <div class="entry-modal-box">
            <div class="view-score-badge">
                <span class="view-score-number" id="view-score-num">—</span>
                <span class="view-score-denom">/9</span>
            </div>
            <div class="view-score-bar" id="view-score-bar"></div>
            <div class="view-date" id="view-date"></div>
            <div class="view-title" id="view-title"></div>
            <div class="view-content" id="view-content"></div>
            <div class="view-actions">
                <button class="view-close-btn" onclick="closeEntryModal()">Close</button>
                <button class="entry-edit-btn" onclick="openEditFromView()">Edit</button>
                <button class="entry-delete-btn" onclick="deleteFromView()">Delete</button>
            </div>
        </div>
    </div>

    <div id="edit-modal">
        <div class="modal-box">
            <div class="modal-label">Title</div>
            <input type="text" id="edit-title" class="modal-input" autocomplete="off">
            <div class="modal-label">Date</div>
            <input type="text" id="edit-date" class="modal-input" autocomplete="off">
            <div class="modal-label">Entry</div>
            <textarea id="edit-content"></textarea>
            <div class="modal-score-row">
                <span class="score-label">Score</span>
                <div class="score-dots" id="edit-score-dots"></div>
            </div>
            <div class="modal-actions">
                <button class="modal-cancel-btn" onclick="closeEditModal()">Cancel</button>
                <button class="modal-save-btn" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const PASSWORD_ENABLED = true;
        const JOURNAL_PASSWORD = "09";

        // ── WARM JAIPUR MONTH COLORS (Adjusted for Dark Mode) ──
        const MONTH_COLORS = {
             1: '141,110,99',   // Jan: Faded Clay
             2: '141,110,99',   // Feb: Faded Clay
             3: '141,110,99',   // Mar: Faded Clay
             4: '230,74,25',    // Apr: Glowing Saffron
             5: '230,74,25',    // May: Glowing Saffron
             6: '230,74,25',    // Jun: Glowing Saffron
             7: '190,100,70',   // Jul: Warm Rust
             8: '190,100,70',   // Aug: Warm Rust
             9: '190,100,70',   // Sep: Warm Rust
            10: '120,80,60',    // Oct: Deep Earth
            11: '120,80,60',    // Nov: Deep Earth
            12: '120,80,60',    // Dec: Deep Earth
        };

        function scoreOpacity(score) {
            const s = Math.max(0, Math.min(9, score || 0));
            return 0.35 + (s / 9) * 0.65; 
        }

        function scoreGlow(score) {
            const s = Math.max(0, Math.min(9, score || 0));
            return s / 9;
        }

        function monthFromDateStr(dateStr) {
            const months = {
                JANUARY:1, FEBRUARY:2, MARCH:3, APRIL:4, MAY:5, JUNE:6,
                JULY:7, AUGUST:8, SEPTEMBER:9, OCTOBER:10, NOVEMBER:11, DECEMBER:12
            };
            const first = (dateStr || '').trim().toUpperCase().split(' ')[0];
            return months[first] || 5;
        }

        function dotColor(dateStr, score) {
            const month = monthFromDateStr(dateStr);
            const rgb   = MONTH_COLORS[month] || MONTH_COLORS[5];
            const alpha = scoreOpacity(score);
            return { rgb, alpha, css: `rgba(${rgb}, ${alpha})` };
        }

        function dotGlowStyle(dateStr, score) {
            const { rgb, alpha } = dotColor(dateStr, score);
            const g = scoreGlow(score);
            const spread = 4 + g * 14;
            const outer  = 2 + g * 8;
            return `0 0 0 ${Math.round(outer)}px rgba(${rgb},${Math.round(alpha * g * 0.2 * 100)/100}), 0 0 ${Math.round(spread)}px rgba(${rgb},${Math.round(alpha * g * 0.6 * 100)/100})`;
        }

        const lockScreen       = document.getElementById('lock-screen');
        const passwordInput    = document.getElementById('password-input');
        const journalContainer = document.getElementById('journal-container');
        const timelineTarget   = document.getElementById('timeline-target');
        const composerPanel    = document.getElementById('composer-panel');
        const entryModal       = document.getElementById('entry-modal');
        const editModal        = document.getElementById('edit-modal');
        const toastEl          = document.getElementById('toast');

        let allEntries    = [];
        let viewingId     = null;
        let editingId     = null;
        let toastTimer    = null;
        let composerScore = 0;
        let editScore     = 0;

        function buildScorePips(containerId, onSelect) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const pip = document.createElement('button');
                pip.className = 'score-pip';
                pip.textContent = i;
                pip.type = 'button';
                pip.dataset.val = i;
                pip.addEventListener('click', () => onSelect(i));
                container.appendChild(pip);
            }
        }

        function setComposerScore(val) {
            composerScore = val;
            document.querySelectorAll('#composer-score-dots .score-pip').forEach(p => {
                p.classList.toggle('selected', parseInt(p.dataset.val) === val);
            });
        }

        function setEditScore(val) {
            editScore = val;
            document.querySelectorAll('#edit-score-dots .score-pip').forEach(p => {
                p.classList.toggle('selected', parseInt(p.dataset.val) === val);
            });
        }

        function showToast(msg, isError = false) {
            clearTimeout(toastTimer);
            toastEl.textContent = msg;
            toastEl.className = isError ? 'error' : '';
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2800);
        }

        async function loadTimeline() {
            try {
                const res = await fetch('/api/entries');
                if (!res.ok) throw new Error('failed');
                allEntries = await res.json();
                renderTimeline(allEntries);
            } catch {
                timelineTarget.innerHTML = '<div class="empty-state">Could not connect to database.</div>';
            }
        }

        function renderTimeline(entries) {
            if (!entries.length) {
                timelineTarget.innerHTML = '<div class="empty-state">No entries yet. The page is blank.</div>';
                return;
            }

            timelineTarget.innerHTML = entries.map((e, i) => {
                const score   = e.score || 0;
                const color   = dotColor(e.date, score);
                const glow    = dotGlowStyle(e.date, score);
                return `
                <div class="tl-node" data-id="${e.id}" onclick="openEntryModal(${e.id})"
                     style="animation: nodeAppear 0.4s cubic-bezier(0.34,1.4,0.64,1) ${i * 60}ms both;"
                     onmouseenter="this.querySelector('.tl-dot').style.boxShadow='${glow}'"
                     onmouseleave="this.querySelector('.tl-dot').style.boxShadow='none'">
                    <div class="tl-preview">
                        <div class="tl-preview-score" style="color:${color.css}">${score}<span>/9</span></div>
                        <div class="tl-preview-date">${escHTML(e.date)}</div>
                        <div class="tl-preview-title">${escHTML(e.title)}</div>
                    </div>
                    <div class="tl-dot"
                         style="background:${color.css};">
                    </div>
                </div>`;
            }).join('');
        }

        function escHTML(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function getFormattedDate() {
            return new Date().toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            }).toUpperCase();
        }

        async function addEntry() {
            const titleEl   = document.getElementById('new-title');
            const contentEl = document.getElementById('new-content');
            const btn       = document.getElementById('record-btn');
            if (!titleEl.value.trim() || !contentEl.value.trim()) return;

            const payload = {
                date:    getFormattedDate(),
                title:   titleEl.value.trim(),
                content: contentEl.value.trim(),
                score:   composerScore
            };

            btn.textContent = 'Saving…';
            btn.disabled = true;
            try {
                const res = await fetch('/api/entries', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify(payload)
                });
                if (res.ok) {
                    titleEl.value = contentEl.value = '';
                    setComposerScore(0);
                    toggleComposer();
                    await loadTimeline();
                    showToast('Entry recorded.');
                } else {
                    const msg = await res.text();
                    showToast('Failed: ' + msg, true);
                }
            } catch { showToast('Network error.', true); }
            btn.textContent = 'Record';
            btn.disabled = false;
        }

        function openEntryModal(id) {
            const e = allEntries.find(x => x.id === id);
            if (!e) return;
            viewingId = id;

            const score = e.score || 0;
            const color = dotColor(e.date, score);

            const numEl = document.getElementById('view-score-num');
            numEl.textContent = score;
            numEl.style.color = color.css;

            document.getElementById('view-date').textContent    = e.date;
            document.getElementById('view-title').textContent   = e.title;
            document.getElementById('view-content').textContent = e.content;

            const bar = document.getElementById('view-score-bar');
            bar.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                const pip = document.createElement('div');
                pip.className = 'view-score-bar-pip';
                if (i <= score) pip.style.background = color.css;
                bar.appendChild(pip);
            }

            entryModal.classList.add('open');
        }

        function closeEntryModal() {
            entryModal.classList.remove('open');
            viewingId = null;
        }

        function openEditFromView() {
            if (!viewingId) return;
            const id = viewingId;
            closeEntryModal();
            setTimeout(() => openEditModal(id), 80);
        }

        async function deleteFromView() {
            if (!viewingId) return;
            const id = viewingId;
            if (!confirm('Delete this entry permanently?')) return;
            try {
                const res = await fetch('/api/entries/' + id, { method: 'DELETE' });
                if (res.ok) {
                    closeEntryModal();
                    await loadTimeline();
                    showToast('Entry deleted.');
                } else { showToast('Delete failed.', true); }
            } catch { showToast('Network error.', true); }
        }

        function openEditModal(id) {
            const e = allEntries.find(x => x.id === id);
            if (!e) return;
            editingId = id;
            document.getElementById('edit-title').value   = e.title;
            document.getElementById('edit-date').value    = e.date;
            document.getElementById('edit-content').value = e.content;
            setEditScore(e.score || 0);
            editModal.classList.add('open');
        }

        function closeEditModal() {
            editModal.classList.remove('open');
            editingId = null;
        }

        async function saveEdit() {
            const title   = document.getElementById('edit-title').value.trim();
            const date    = document.getElementById('edit-date').value.trim();
            const content = document.getElementById('edit-content').value.trim();
            if (!title || !date || !content || !editingId) return;

            try {
                const res = await fetch('/api/entries/' + editingId, {
                    method:  'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ date, title, content, score: editScore })
                });
                if (res.ok) {
                    closeEditModal();
                    await loadTimeline();
                    showToast('Entry updated.');
                } else {
                    const msg = await res.text();
                    showToast('Save failed: ' + msg, true);
                }
            } catch { showToast('Network error.', true); }
        }

        entryModal.addEventListener('click', e => { if (e.target === entryModal) closeEntryModal(); });
        editModal.addEventListener('click',  e => { if (e.target === editModal)  closeEditModal(); });

        function toggleComposer() {
            composerPanel.classList.toggle('open');
        }

        function revealJournal() {
            lockScreen.style.opacity = '0';
            setTimeout(() => {
                lockScreen.style.display = 'none';
                journalContainer.style.display = 'block';
                setTimeout(() => {
                    journalContainer.style.opacity = '1';
                    journalContainer.style.transform = 'translateY(0)';
                    loadTimeline();
                }, 40);
            }, 500);
        }

        (function init() {
            const style = document.createElement('style');
            style.textContent = `
                @keyframes nodeAppear {
                    from { opacity: 0; transform: scale(0.3); }
                    to   { opacity: 1; transform: scale(1); }
                }
            `;
            document.head.appendChild(style);

            buildScorePips('composer-score-dots', setComposerScore);
            buildScorePips('edit-score-dots', setEditScore);

            if (!PASSWORD_ENABLED) {
                lockScreen.style.display = 'none';
                journalContainer.style.display = 'block';
                journalContainer.style.opacity = '1';
                journalContainer.style.transform = 'translateY(0)';
                loadTimeline();
            } else {
                passwordInput.addEventListener('keypress', e => {
                    if (e.key !== 'Enter') return;
                    if (passwordInput.value === JOURNAL_PASSWORD) {
                        revealJournal();
                    } else {
                        passwordInput.value = '';
                        passwordInput.style.borderColor = '#e53935';
                        setTimeout(() => passwordInput.style.borderColor = 'var(--muted)', 500);
                    }
                });
            }
        })();
    </script>
</body>
</html>
